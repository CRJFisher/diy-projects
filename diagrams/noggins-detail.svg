<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 520" width="600" height="520" font-family="Arial, Helvetica, sans-serif">
  <style>
    .label { fill: #2e5090; font-size: 12px; }
    .label-bold { fill: #2e5090; font-size: 12px; font-weight: bold; }
    .dim { fill: #2e5090; font-size: 11px; }
    .title { fill: #2e5090; font-size: 16px; font-weight: bold; }
  </style>

  <!-- Title -->
  <text x="300" y="28" text-anchor="middle" class="title">Noggins Detail — Lower Zone of Back Frame</text>
  <text x="300" y="46" text-anchor="middle" style="fill:#c0392b;font-size:13px;font-weight:bold;">OPTIONAL -- only needed if cladding requires extra support</text>

  <!-- Left post -->
  <rect x="60" y="50" width="47" height="420" fill="#d4a574" stroke="#8b6914" stroke-width="1.5" rx="2"/>
  <!-- Centre post -->
  <rect x="350" y="50" width="47" height="420" fill="#d4a574" stroke="#8b6914" stroke-width="1.5" rx="2"/>
  <!-- Right post -->
  <rect x="510" y="50" width="47" height="420" fill="#d4a574" stroke="#8b6914" stroke-width="1.5" rx="2"/>

  <!-- Mid-rail (top of view) — spans all three posts -->
  <rect x="60" y="50" width="497" height="30" fill="#d4a574" stroke="#8b6914" stroke-width="1.5" rx="2"/>
  <!-- Bottom rail — spans all three posts -->
  <rect x="60" y="440" width="497" height="30" fill="#d4a574" stroke="#8b6914" stroke-width="1.5" rx="2"/>

  <!-- Post labels -->
  <text x="83" y="495" text-anchor="middle" class="label">Left post</text>
  <text x="373" y="495" text-anchor="middle" class="label">Centre post</text>
  <text x="533" y="495" text-anchor="middle" class="label">Right post</text>

  <!-- Rail labels -->
  <text x="300" y="43" text-anchor="middle" class="label-bold">Mid-rail (at 775 mm)</text>
  <text x="300" y="488" text-anchor="middle" class="label-bold">Bottom rail (ground level)</text>

  <!-- LEFT SECTION NOGGINS (780mm clear span, from x=107 to x=350) -->
  <!-- Noggin 1 (upper) -->
  <rect x="107" y="190" width="243" height="30" fill="#e0c090" stroke="#8b6914" stroke-width="1.2" rx="2"/>
  <!-- Noggin 2 (lower) -->
  <rect x="107" y="330" width="243" height="30" fill="#e0c090" stroke="#8b6914" stroke-width="1.2" rx="2"/>

  <!-- RIGHT SECTION NOGGINS (370mm clear span, from x=397 to x=510) -->
  <!-- Noggin 3 (upper) -->
  <rect x="397" y="190" width="113" height="30" fill="#e0c090" stroke="#8b6914" stroke-width="1.2" rx="2"/>
  <!-- Noggin 4 (lower) -->
  <rect x="397" y="330" width="113" height="30" fill="#e0c090" stroke="#8b6914" stroke-width="1.2" rx="2"/>

  <!-- Screw dots on noggin 1 — left end -->
  <circle cx="112" cy="199" r="4" fill="#c0392b"/>
  <circle cx="112" cy="211" r="4" fill="#c0392b"/>
  <!-- Screw dots on noggin 1 — right end -->
  <circle cx="345" cy="199" r="4" fill="#c0392b"/>
  <circle cx="345" cy="211" r="4" fill="#c0392b"/>

  <!-- Screw dots on noggin 2 — left end -->
  <circle cx="112" cy="339" r="4" fill="#c0392b"/>
  <circle cx="112" cy="351" r="4" fill="#c0392b"/>
  <!-- Screw dots on noggin 2 — right end -->
  <circle cx="345" cy="339" r="4" fill="#c0392b"/>
  <circle cx="345" cy="351" r="4" fill="#c0392b"/>

  <!-- Screw dots on noggin 3 — left end -->
  <circle cx="402" cy="199" r="4" fill="#c0392b"/>
  <circle cx="402" cy="211" r="4" fill="#c0392b"/>
  <!-- Screw dots on noggin 3 — right end -->
  <circle cx="505" cy="199" r="4" fill="#c0392b"/>
  <circle cx="505" cy="211" r="4" fill="#c0392b"/>

  <!-- Screw dots on noggin 4 — left end -->
  <circle cx="402" cy="339" r="4" fill="#c0392b"/>
  <circle cx="402" cy="351" r="4" fill="#c0392b"/>
  <!-- Screw dots on noggin 4 — right end -->
  <circle cx="505" cy="339" r="4" fill="#c0392b"/>
  <circle cx="505" cy="351" r="4" fill="#c0392b"/>

  <!-- Cladding board 1 — overlapping noggin 1 area and posts (transparent) -->
  <rect x="50" y="185" width="520" height="18" fill="#c8b090" fill-opacity="0.4" stroke="#a09070" stroke-width="1" stroke-dasharray="4,2" rx="1"/>
  <!-- Cladding board 2 — overlapping noggin 2 area and posts (transparent) -->
  <rect x="50" y="325" width="520" height="18" fill="#c8b090" fill-opacity="0.4" stroke="#a09070" stroke-width="1" stroke-dasharray="4,2" rx="1"/>

  <!-- Cladding screw dots (into noggin through cladding) -->
  <circle cx="228" cy="199" r="4" fill="#c0392b"/>
  <circle cx="228" cy="339" r="4" fill="#c0392b"/>
  <circle cx="453" cy="199" r="4" fill="#c0392b"/>
  <circle cx="453" cy="339" r="4" fill="#c0392b"/>

  <!-- Dimension: spacing arrows (left side) -->
  <!-- Line from mid-rail bottom to noggin 1 -->
  <line x1="38" y1="80" x2="38" y2="190" stroke="#2e5090" stroke-width="1"/>
  <line x1="33" y1="80" x2="43" y2="80" stroke="#2e5090" stroke-width="1"/>
  <line x1="33" y1="190" x2="43" y2="190" stroke="#2e5090" stroke-width="1"/>
  <!-- Line from noggin 1 to noggin 2 -->
  <line x1="38" y1="220" x2="38" y2="330" stroke="#2e5090" stroke-width="1"/>
  <line x1="33" y1="220" x2="43" y2="220" stroke="#2e5090" stroke-width="1"/>
  <line x1="33" y1="330" x2="43" y2="330" stroke="#2e5090" stroke-width="1"/>
  <!-- Line from noggin 2 to bottom rail -->
  <line x1="38" y1="360" x2="38" y2="440" stroke="#2e5090" stroke-width="1"/>
  <line x1="33" y1="360" x2="43" y2="360" stroke="#2e5090" stroke-width="1"/>
  <line x1="33" y1="440" x2="43" y2="440" stroke="#2e5090" stroke-width="1"/>

  <!-- Spacing labels -->
  <text x="10" y="139" text-anchor="start" class="dim">~258</text>
  <text x="10" y="279" text-anchor="start" class="dim">~258</text>
  <text x="10" y="404" text-anchor="start" class="dim">~258</text>

  <!-- Left section width dimension -->
  <line x1="107" y1="160" x2="350" y2="160" stroke="#2e5090" stroke-width="1"/>
  <line x1="107" y1="155" x2="107" y2="165" stroke="#2e5090" stroke-width="1"/>
  <line x1="350" y1="155" x2="350" y2="165" stroke="#2e5090" stroke-width="1"/>
  <text x="228" y="155" text-anchor="middle" class="dim">780 mm</text>

  <!-- Right section width dimension -->
  <line x1="397" y1="160" x2="510" y2="160" stroke="#2e5090" stroke-width="1"/>
  <line x1="397" y1="155" x2="397" y2="165" stroke="#2e5090" stroke-width="1"/>
  <line x1="510" y1="155" x2="510" y2="165" stroke="#2e5090" stroke-width="1"/>
  <text x="453" y="155" text-anchor="middle" class="dim">370 mm</text>

  <!-- Noggin label with leader line -->
  <line x1="243" y1="345" x2="228" y2="395" stroke="#2e5090" stroke-width="1"/>
  <text x="148" y="410" text-anchor="start" class="label-bold">Noggin (spans full width</text>
  <text x="148" y="424" text-anchor="start" class="label">between posts, like a rail)</text>

  <!-- Cladding board label -->
  <line x1="500" y1="190" x2="540" y2="130" stroke="#2e5090" stroke-width="1"/>
  <text x="460" y="125" text-anchor="start" class="label-bold">Cladding board</text>
  <text x="460" y="139" text-anchor="start" class="label">(shown transparent)</text>

  <!-- Screw label -->
  <circle cx="470" cy="268" r="4" fill="#c0392b"/>
  <text x="480" y="272" text-anchor="start" class="label">= screw position</text>
  <text x="480" y="286" text-anchor="start" class="label">(75 mm into noggin ends,</text>
  <text x="480" y="300" text-anchor="start" class="label">50 mm through cladding)</text>
</svg>
