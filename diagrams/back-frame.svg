<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="-80 -40 620 780" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <text x="220" y="-10" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">Back Frame -- Face-On View</text>

  <defs>
    <marker id="arrowEnd" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#c0392b" stroke-width="1"/>
    </marker>
    <marker id="arrowStart" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <path d="M8,0 L0,3 L8,6" fill="none" stroke="#c0392b" stroke-width="1"/>
    </marker>
  </defs>

  <!-- Right section shading -->
  <rect x="258" y="38" width="132" height="622" fill="#f0e8d8" opacity="0.5" rx="2"/>

  <!-- Left post -->
  <rect x="20" y="20" width="18" height="640" fill="#d4a574" stroke="#8b6914" stroke-width="1.5" rx="1"/>
  <!-- Centre-back post at 780mm => scaled: 20 + (780/1300)*360 = 20 + 216 = 236 -->
  <rect x="247" y="20" width="18" height="640" fill="#d4a574" stroke="#8b6914" stroke-width="1.5" rx="1"/>
  <!-- Right post -->
  <rect x="392" y="20" width="18" height="640" fill="#d4a574" stroke="#8b6914" stroke-width="1.5" rx="1"/>

  <!-- Top rail (spans full width between outer posts) -->
  <rect x="38" y="20" width="354" height="18" fill="#d4a574" stroke="#8b6914" stroke-width="1.5" rx="1"/>
  <!-- Bottom rail -->
  <rect x="38" y="642" width="354" height="18" fill="#d4a574" stroke="#8b6914" stroke-width="1.5" rx="1"/>
  <!-- Mid-height rail at 775mm (spans full width) -->
  <rect x="38" y="350" width="354" height="18" fill="#d4a574" stroke="#8b6914" stroke-width="1.5" rx="1"/>

  <!-- X-BRACES in upper section, LEFT section only (15x38mm user-supplied timber) -->
  <line x1="42" y1="42" x2="243" y2="346" stroke="#c9a86c" stroke-width="6" stroke-linecap="butt" opacity="0.85"/>
  <line x1="42" y1="42" x2="243" y2="346" stroke="#8b6914" stroke-width="1" fill="none" stroke-linecap="butt"/>
  <line x1="243" y1="42" x2="42" y2="346" stroke="#c9a86c" stroke-width="6" stroke-linecap="butt" opacity="0.85"/>
  <line x1="243" y1="42" x2="42" y2="346" stroke="#8b6914" stroke-width="1" fill="none" stroke-linecap="butt"/>

  <!-- Crossing point -->
  <circle cx="142" cy="194" r="6" fill="none" stroke="#c0392b" stroke-width="1.5"/>
  <text x="155" y="188" font-size="9" fill="#c0392b">single screw</text>
  <text x="155" y="199" font-size="9" fill="#c0392b">at crossing</text>

  <!-- Screw indicators at brace ends -->
  <circle cx="52" cy="50" r="3" fill="#c0392b" opacity="0.7"/>
  <circle cx="60" cy="58" r="3" fill="#c0392b" opacity="0.7"/>
  <circle cx="235" cy="50" r="3" fill="#c0392b" opacity="0.7"/>
  <circle cx="227" cy="58" r="3" fill="#c0392b" opacity="0.7"/>
  <circle cx="52" cy="338" r="3" fill="#c0392b" opacity="0.7"/>
  <circle cx="60" cy="330" r="3" fill="#c0392b" opacity="0.7"/>
  <circle cx="235" cy="338" r="3" fill="#c0392b" opacity="0.7"/>
  <circle cx="227" cy="330" r="3" fill="#c0392b" opacity="0.7"/>

  <!-- DIMENSIONS -->
  <!-- Full width 1300mm -->
  <line x1="20" y1="-2" x2="20" y2="-7" stroke="#c0392b" stroke-width="1"/>
  <line x1="410" y1="-2" x2="410" y2="-7" stroke="#c0392b" stroke-width="1"/>
  <line x1="20" y1="-4" x2="410" y2="-4" stroke="#c0392b" stroke-width="1" marker-start="url(#arrowStart)" marker-end="url(#arrowEnd)"/>
  <text x="215" y="-10" text-anchor="middle" font-size="12" font-weight="bold" fill="#c0392b">1300 mm</text>

  <!-- Left section 780mm -->
  <line x1="20" y1="685" x2="20" y2="700" stroke="#c0392b" stroke-width="1"/>
  <line x1="256" y1="685" x2="256" y2="700" stroke="#c0392b" stroke-width="1"/>
  <line x1="20" y1="693" x2="256" y2="693" stroke="#c0392b" stroke-width="1" marker-start="url(#arrowStart)" marker-end="url(#arrowEnd)"/>
  <text x="138" y="710" text-anchor="middle" font-size="11" font-weight="bold" fill="#c0392b">780 mm</text>

  <!-- Right section 470mm (shifted down slightly to avoid overlap) -->
  <line x1="265" y1="685" x2="265" y2="700" stroke="#c0392b" stroke-width="1"/>
  <line x1="410" y1="685" x2="410" y2="700" stroke="#c0392b" stroke-width="1"/>
  <line x1="265" y1="693" x2="410" y2="693" stroke="#c0392b" stroke-width="1" marker-start="url(#arrowStart)" marker-end="url(#arrowEnd)"/>
  <text x="338" y="710" text-anchor="middle" font-size="11" font-weight="bold" fill="#c0392b">470 mm</text>

  <!-- Height 1647mm -->
  <line x1="0" y1="20" x2="-5" y2="20" stroke="#c0392b" stroke-width="1"/>
  <line x1="0" y1="660" x2="-5" y2="660" stroke="#c0392b" stroke-width="1"/>
  <line x1="-2" y1="20" x2="-2" y2="660" stroke="#c0392b" stroke-width="1" marker-start="url(#arrowStart)" marker-end="url(#arrowEnd)"/>
  <text x="-8" y="345" text-anchor="middle" font-size="12" font-weight="bold" fill="#c0392b" transform="rotate(-90, -8, 345)">1647 mm</text>

  <!-- Mid-rail height 775mm -->
  <line x1="430" y1="660" x2="460" y2="660" stroke="#c0392b" stroke-width="1"/>
  <line x1="430" y1="359" x2="460" y2="359" stroke="#c0392b" stroke-width="1"/>
  <line x1="455" y1="660" x2="455" y2="359" stroke="#c0392b" stroke-width="1" marker-start="url(#arrowStart)" marker-end="url(#arrowEnd)"/>
  <text x="462" y="515" text-anchor="start" font-size="11" font-weight="bold" fill="#c0392b" transform="rotate(-90, 462, 515)">775 mm</text>

  <!-- LABELS -->
  <!-- Post labels -->
  <text x="10" y="725" text-anchor="start" font-size="10" fill="#2e5090" font-weight="bold">Left Post</text>
  <line x1="29" y1="665" x2="29" y2="718" stroke="#2e5090" stroke-width="0.8" stroke-dasharray="3,2"/>

  <text x="230" y="725" text-anchor="middle" font-size="10" fill="#2e5090" font-weight="bold">Centre Post</text>
  <line x1="256" y1="665" x2="256" y2="718" stroke="#2e5090" stroke-width="0.8" stroke-dasharray="3,2"/>

  <text x="380" y="725" text-anchor="start" font-size="10" fill="#2e5090" font-weight="bold">Right Post</text>
  <line x1="401" y1="665" x2="401" y2="718" stroke="#2e5090" stroke-width="0.8" stroke-dasharray="3,2"/>

  <!-- Rail labels -->
  <text x="215" y="16" text-anchor="middle" font-size="10" fill="#2e5090" font-weight="bold">Top Rail</text>
  <text x="215" y="638" text-anchor="middle" font-size="10" fill="#2e5090" font-weight="bold">Bottom Rail</text>
  <text x="215" y="346" text-anchor="middle" font-size="10" fill="#2e5090" font-weight="bold">Mid Rail (775 mm)</text>

  <!-- Brace labels -->
  <text x="90" y="140" text-anchor="middle" font-size="10" fill="#2e5090" font-weight="bold" transform="rotate(-50, 90, 140)">Brace (15x38)</text>
  <text x="195" y="140" text-anchor="middle" font-size="10" fill="#2e5090" font-weight="bold" transform="rotate(50, 195, 140)">Brace (15x38)</text>

  <!-- Centre post joint note -->
  <text x="295" y="30" text-anchor="start" font-size="8" fill="#8b6914" font-style="italic">Rails pass over</text>
  <text x="295" y="40" text-anchor="start" font-size="8" fill="#8b6914" font-style="italic">centre post (face-screwed)</text>

  <!-- Section labels -->
  <text x="138" y="605" text-anchor="middle" font-size="10" fill="#2e5090" font-weight="bold">Enclosed section</text>
  <text x="138" y="617" text-anchor="middle" font-size="9" fill="#2e5090">(~780 mm)</text>

  <text x="338" y="500" text-anchor="middle" font-size="10" fill="#2e5090" font-weight="bold">Shelves section</text>
  <text x="338" y="512" text-anchor="middle" font-size="9" fill="#2e5090">(~470 mm)</text>

  <!-- Zone annotations (left section only) -->
  <line x1="-45" y1="38" x2="-35" y2="38" stroke="#2e5090" stroke-width="1"/>
  <line x1="-45" y1="350" x2="-35" y2="350" stroke="#2e5090" stroke-width="1"/>
  <line x1="-40" y1="38" x2="-40" y2="350" stroke="#2e5090" stroke-width="1"/>
  <text x="-48" y="200" text-anchor="middle" font-size="9" fill="#2e5090" transform="rotate(-90, -48, 200)">Bracing Zone</text>

  <line x1="-45" y1="368" x2="-35" y2="368" stroke="#2e5090" stroke-width="1"/>
  <line x1="-45" y1="642" x2="-35" y2="642" stroke="#2e5090" stroke-width="1"/>
  <line x1="-40" y1="368" x2="-40" y2="642" stroke="#2e5090" stroke-width="1"/>
  <text x="-48" y="510" text-anchor="middle" font-size="9" fill="#2e5090" transform="rotate(-90, -48, 510)">Cladding Zone</text>
</svg>
