<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 700 600" xmlns="http://www.w3.org/2000/svg" style="max-width:700px; width:100%;">
  <text x="350" y="28" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#2c3e50">Box Frame Isometric View -- After Step 3</text>
  <text x="350" y="46" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#888" font-style="italic">Front and back frames connected by depth rails</text>

  <defs>
    <marker id="aEnd" markerWidth="7" markerHeight="5" refX="0" refY="2.5" orient="auto"><path d="M0,0 L7,2.5 L0,5 Z" fill="#c0392b"/></marker>
    <marker id="aStart" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><path d="M7,0 L0,2.5 L7,5 Z" fill="#c0392b"/></marker>
  </defs>

  <!-- === BACK FRAME === -->
  <line x1="290" y1="420" x2="290" y2="59" stroke="#b8944a" stroke-width="3.5"/>
  <line x1="508" y1="420" x2="508" y2="59" stroke="#b8944a" stroke-width="3.5"/>
  <line x1="654" y1="420" x2="654" y2="59" stroke="#b8944a" stroke-width="3.5"/>
  <line x1="290" y1="59" x2="654" y2="59" stroke="#b8944a" stroke-width="3"/>
  <line x1="290" y1="420" x2="654" y2="420" stroke="#b8944a" stroke-width="3"/>
  <line x1="290" y1="203" x2="654" y2="203" stroke="#b8944a" stroke-width="3"/>
  <line x1="292" y1="61" x2="506" y2="201" stroke="#c9975e" stroke-width="2"/>
  <line x1="506" y1="61" x2="292" y2="201" stroke="#c9975e" stroke-width="2"/>

  <!-- === DEPTH RAILS === -->
  <line x1="120" y1="120" x2="290" y2="59" stroke="#e07020" stroke-width="3"/>
  <line x1="120" y1="520" x2="290" y2="420" stroke="#e07020" stroke-width="3"/>
  <line x1="484" y1="120" x2="654" y2="59" stroke="#e07020" stroke-width="3"/>
  <line x1="484" y1="520" x2="654" y2="420" stroke="#e07020" stroke-width="3"/>

  <!-- === FRONT FRAME === -->
  <line x1="120" y1="520" x2="120" y2="120" stroke="#d4a574" stroke-width="5"/>
  <line x1="484" y1="520" x2="484" y2="120" stroke="#d4a574" stroke-width="5"/>
  <line x1="120" y1="120" x2="484" y2="120" stroke="#d4a574" stroke-width="4"/>

  <!-- === DIMENSIONS === -->
  <text x="60" y="325" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#c0392b" transform="rotate(-90,60,325)">1597 mm (front)</text>
  <line x1="80" y1="120" x2="80" y2="520" stroke="#c0392b" stroke-width="1"/>
  <line x1="72" y1="120" x2="88" y2="120" stroke="#c0392b" stroke-width="1"/>
  <line x1="72" y1="520" x2="88" y2="520" stroke="#c0392b" stroke-width="1"/>

  <text x="690" y="245" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#c0392b" transform="rotate(-90,690,245)">1647 mm (back)</text>
  <line x1="672" y1="59" x2="672" y2="420" stroke="#c0392b" stroke-width="1"/>
  <line x1="664" y1="59" x2="680" y2="59" stroke="#c0392b" stroke-width="1"/>
  <line x1="664" y1="420" x2="680" y2="420" stroke="#c0392b" stroke-width="1"/>

  <line x1="120" y1="545" x2="484" y2="545" stroke="#c0392b" stroke-width="1" marker-start="url(#aStart)" marker-end="url(#aEnd)"/>
  <text x="302" y="560" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#c0392b">1300 mm</text>

  <line x1="498" y1="530" x2="665" y2="430" stroke="#c0392b" stroke-width="1" marker-start="url(#aStart)" marker-end="url(#aEnd)"/>
  <text x="600" y="498" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#c0392b" transform="rotate(-30,600,498)">844 mm depth</text>

  <!-- === LABELS === -->
  <text x="302" y="110" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#2e5090">Front top rail</text>
  <text x="472" y="50" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#8b6914">Back top rail</text>
  <text x="472" y="214" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#8b6914">Back mid-rail (775 mm)</text>
  <text x="472" y="434" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#8b6914">Back bottom rail</text>
  <text x="185" y="82" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#e07020" font-weight="bold" transform="rotate(-22,185,82)">Depth rail (sloped)</text>
  <text x="185" y="485" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#e07020" font-weight="bold" transform="rotate(-30,185,485)">Depth rail (level)</text>
  <text x="120" y="75" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#c0392b">50 mm drop</text>
  <line x1="120" y1="80" x2="120" y2="115" stroke="#c0392b" stroke-width="0.8" stroke-dasharray="3,2"/>
</svg>
