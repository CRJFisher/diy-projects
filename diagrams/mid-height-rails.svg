<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="-80 -50 680 820" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <text x="240" y="-20" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">Front View -- Mid-Height Rails Highlighted</text>
  <text x="240" y="-2" text-anchor="middle" font-size="11" fill="#888" font-style="italic">All mid-rails at 775 mm from ground</text>

  <defs>
    <marker id="arrowEnd" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#c0392b" stroke-width="1"/>
    </marker>
    <marker id="arrowStart" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <path d="M8,0 L0,3 L8,6" fill="none" stroke="#c0392b" stroke-width="1"/>
    </marker>
  </defs>

  <!--
    Front view looking at the bin store from the front.
    Scale: ~0.39 px/mm horizontally (1300mm -> ~507px), ~0.39 px/mm vertically (1597mm -> ~623px)

    Posts (front view, 1597mm tall):
      Left-front post: x=20
      Centre post: x=324 (20 + 780*0.39 = 324)
      Right-front post: x=507

    Ground at y=660, top at y=37
    Mid-rail at 775mm => y = 660 - 775*0.39 = 358
  -->

  <!-- Frame outline (ghost) -->
  <!-- Left-front post -->
  <rect x="20" y="37" width="18" height="623" fill="#e8d8c0" stroke="#bbb" stroke-width="1" rx="1" opacity="0.5"/>
  <!-- Centre post -->
  <rect x="324" y="37" width="18" height="623" fill="#e8d8c0" stroke="#bbb" stroke-width="1" rx="1" opacity="0.5"/>
  <!-- Right-front post -->
  <rect x="507" y="37" width="18" height="623" fill="#e8d8c0" stroke="#bbb" stroke-width="1" rx="1" opacity="0.5"/>

  <!-- Top rail (ghost) -->
  <rect x="38" y="37" width="469" height="14" fill="#e8d8c0" stroke="#bbb" stroke-width="1" rx="1" opacity="0.5"/>
  <!-- Bottom rail right section only (ghost) -->
  <rect x="342" y="646" width="165" height="14" fill="#e8d8c0" stroke="#bbb" stroke-width="1" rx="1" opacity="0.5"/>

  <!-- ===== MID-HEIGHT RAILS (HIGHLIGHTED) ===== -->

  <!-- 1. Back wall mid-rail (1300mm, shown as dashed because it is behind the front face) -->
  <rect x="20" y="354" width="507" height="14" fill="#ff9800" stroke="#e67e00" stroke-width="2" rx="1" opacity="0.35" stroke-dasharray="8,4"/>
  <text x="260" y="348" text-anchor="middle" font-size="10" fill="#e67e00" font-weight="bold">Back wall mid-rail (behind, 1300 mm)</text>

  <!-- 2. Left side mid-rail (750mm, going into page; shown as short stub at left post) -->
  <rect x="22" y="356" width="14" height="10" fill="#ff9800" stroke="#e67e00" stroke-width="2" rx="1"/>
  <!-- Depth arrow going into the page -->
  <line x1="29" y1="374" x2="29" y2="400" stroke="#e67e00" stroke-width="1.5"/>
  <polygon points="29,400 25,392 33,392" fill="#e67e00"/>
  <text x="29" y="416" text-anchor="middle" font-size="9" fill="#e67e00" font-weight="bold">Left wall</text>
  <text x="29" y="428" text-anchor="middle" font-size="9" fill="#e67e00">750 mm</text>
  <text x="29" y="440" text-anchor="middle" font-size="8" fill="#e67e00" font-style="italic">(into page)</text>

  <!-- 3. Centre divider mid-rail (750mm, going into page; shown at centre post) -->
  <rect x="326" y="356" width="14" height="10" fill="#ff9800" stroke="#e67e00" stroke-width="2" rx="1"/>
  <!-- Depth arrow going into the page -->
  <line x1="333" y1="374" x2="333" y2="400" stroke="#e67e00" stroke-width="1.5"/>
  <polygon points="333,400 329,392 337,392" fill="#e67e00"/>
  <text x="333" y="416" text-anchor="middle" font-size="9" fill="#e67e00" font-weight="bold">Centre divider</text>
  <text x="333" y="428" text-anchor="middle" font-size="9" fill="#e67e00">750 mm</text>
  <text x="333" y="440" text-anchor="middle" font-size="8" fill="#e67e00" font-style="italic">(into page)</text>

  <!-- NO right side wall mid-rail annotation -->
  <line x1="530" y1="361" x2="560" y2="361" stroke="#c0392b" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="565" y="350" text-anchor="start" font-size="9" fill="#c0392b" font-weight="bold">No right side wall</text>
  <text x="565" y="362" text-anchor="start" font-size="9" fill="#c0392b">mid-rail (shelves</text>
  <text x="565" y="374" text-anchor="start" font-size="9" fill="#c0392b">act as bracing)</text>

  <!-- ===== DIMENSION LINES ===== -->

  <!-- Post height: 1597mm -->
  <line x1="0" y1="37" x2="-5" y2="37" stroke="#c0392b" stroke-width="1"/>
  <line x1="0" y1="660" x2="-5" y2="660" stroke="#c0392b" stroke-width="1"/>
  <line x1="-2" y1="37" x2="-2" y2="660" stroke="#c0392b" stroke-width="1" marker-start="url(#arrowStart)" marker-end="url(#arrowEnd)"/>
  <text x="-8" y="355" text-anchor="middle" font-size="12" font-weight="bold" fill="#c0392b" transform="rotate(-90, -8, 355)">1597 mm (front posts)</text>

  <!-- Mid-rail height: 775mm from ground -->
  <line x1="545" y1="660" x2="555" y2="660" stroke="#c0392b" stroke-width="1"/>
  <line x1="545" y1="361" x2="555" y2="361" stroke="#c0392b" stroke-width="1"/>
  <line x1="550" y1="660" x2="550" y2="361" stroke="#c0392b" stroke-width="1" marker-start="url(#arrowStart)" marker-end="url(#arrowEnd)"/>
  <text x="543" y="515" text-anchor="middle" font-size="11" font-weight="bold" fill="#c0392b" transform="rotate(-90, 543, 515)">775 mm</text>

  <!-- Full width: 1300mm -->
  <line x1="20" y1="-12" x2="20" y2="-17" stroke="#c0392b" stroke-width="1"/>
  <line x1="525" y1="-12" x2="525" y2="-17" stroke="#c0392b" stroke-width="1"/>
  <line x1="20" y1="-14" x2="525" y2="-14" stroke="#c0392b" stroke-width="1" marker-start="url(#arrowStart)" marker-end="url(#arrowEnd)"/>
  <text x="272" y="-22" text-anchor="middle" font-size="12" font-weight="bold" fill="#c0392b">1300 mm</text>

  <!-- Section widths -->
  <line x1="20" y1="690" x2="20" y2="705" stroke="#c0392b" stroke-width="1"/>
  <line x1="333" y1="690" x2="333" y2="705" stroke="#c0392b" stroke-width="1"/>
  <line x1="20" y1="698" x2="333" y2="698" stroke="#c0392b" stroke-width="1" marker-start="url(#arrowStart)" marker-end="url(#arrowEnd)"/>
  <text x="176" y="715" text-anchor="middle" font-size="11" font-weight="bold" fill="#c0392b">~780 mm (door opening)</text>

  <line x1="342" y1="690" x2="342" y2="705" stroke="#c0392b" stroke-width="1"/>
  <line x1="525" y1="690" x2="525" y2="705" stroke="#c0392b" stroke-width="1"/>
  <line x1="342" y1="698" x2="525" y2="698" stroke="#c0392b" stroke-width="1" marker-start="url(#arrowStart)" marker-end="url(#arrowEnd)"/>
  <text x="434" y="715" text-anchor="middle" font-size="11" font-weight="bold" fill="#c0392b">~470 mm</text>

  <!-- Ground line -->
  <line x1="-20" y1="660" x2="560" y2="660" stroke="#888" stroke-width="1.5" stroke-dasharray="8,4"/>
  <text x="270" y="678" text-anchor="middle" font-size="11" fill="#888">Ground level</text>

  <!-- Post labels -->
  <text x="29" y="745" text-anchor="middle" font-size="10" fill="#2e5090" font-weight="bold">Left-front</text>
  <text x="29" y="757" text-anchor="middle" font-size="10" fill="#2e5090">post</text>
  <line x1="29" y1="665" x2="29" y2="738" stroke="#2e5090" stroke-width="0.8" stroke-dasharray="3,2"/>

  <text x="333" y="745" text-anchor="middle" font-size="10" fill="#2e5090" font-weight="bold">Centre</text>
  <text x="333" y="757" text-anchor="middle" font-size="10" fill="#2e5090">post</text>
  <line x1="333" y1="665" x2="333" y2="738" stroke="#2e5090" stroke-width="0.8" stroke-dasharray="3,2"/>

  <text x="516" y="745" text-anchor="middle" font-size="10" fill="#2e5090" font-weight="bold">Right-front</text>
  <text x="516" y="757" text-anchor="middle" font-size="10" fill="#2e5090">post</text>
  <line x1="516" y1="665" x2="516" y2="738" stroke="#2e5090" stroke-width="0.8" stroke-dasharray="3,2"/>

  <!-- Colour key -->
  <rect x="20" y="770" width="12" height="12" fill="#e8d8c0" stroke="#bbb" stroke-width="1" rx="1"/>
  <text x="38" y="781" font-size="10" fill="#555">Frame (ghost)</text>
  <rect x="150" y="770" width="12" height="12" fill="#ff9800" stroke="#e67e00" stroke-width="1" rx="1"/>
  <text x="168" y="781" font-size="10" fill="#555">Mid-height rails at 775 mm</text>
</svg>
